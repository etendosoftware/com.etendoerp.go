openapi: 3.0.3
info:
  title: EtendoGo API
  description: REST API for the EtendoGo mobile application
  version: 1.0.0
servers:
  - url: /sws/etendogo
paths:
  /health:
    $ref: 'paths/health.yaml'
  /scan-product:
    $ref: 'paths/scan-product.yaml'
  /business-partners:
    $ref: 'paths/business-partners.yaml'
  /business-partners/{id}:
    $ref: 'paths/business-partner-by-id.yaml'
components:
  schemas:
    HealthResponse:
      $ref: 'components/schemas/HealthResponse.yaml'
    ProductScanRequest:
      $ref: 'components/schemas/ProductScanRequest.yaml'
    ProductScanResponse:
      $ref: 'components/schemas/ProductScanResponse.yaml'
    ErrorResponse:
      $ref: 'components/schemas/ErrorResponse.yaml'
    BusinessPartner:
      $ref: 'components/schemas/BusinessPartner.yaml'
    BusinessPartnerListResponse:
      $ref: 'components/schemas/BusinessPartnerListResponse.yaml'
