get:
  operationId: getBusinessPartner
  summary: Get a business partner
  description: Returns a business partner by ID
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
  responses:
    '200':
      description: Business partner found
      content:
        application/json:
          schema:
            $ref: '../components/schemas/BusinessPartner.yaml'
    '404':
      description: Business partner not found
      content:
        application/json:
          schema:
            $ref: '../components/schemas/ErrorResponse.yaml'
put:
  operationId: updateBusinessPartner
  summary: Update a business partner
  description: Updates an existing business partner
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../components/schemas/BusinessPartner.yaml'
  responses:
    '200':
      description: Business partner updated
      content:
        application/json:
          schema:
            $ref: '../components/schemas/BusinessPartner.yaml'
    '404':
      description: Business partner not found
      content:
        application/json:
          schema:
            $ref: '../components/schemas/ErrorResponse.yaml'
delete:
  operationId: deleteBusinessPartner
  summary: Delete a business partner
  description: Deletes a business partner by ID
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
  responses:
    '204':
      description: Business partner deleted
    '404':
      description: Business partner not found
      content:
        application/json:
          schema:
            $ref: '../components/schemas/ErrorResponse.yaml'
