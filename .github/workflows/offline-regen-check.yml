# AUTO-GENERATED from etendosoftware/etendo_schema_forge
#   .github/workflows/offline-regen-check.yml
# Do not edit by hand — re-run `make sync-regen-check-workflow` in schema_forge
# and commit the result. Manual edits here will be overwritten on next sync.

name: Offline Regeneration Check (mirror)

# Mirror of the schema_forge "Offline Regeneration Check": runs whenever the
# committed ETGO_SF_*.xml baseline changes in com.etendoerp.go, so drift
# introduced from this side (manual XML edit, export.database run) is detected
# even when schema_forge itself has no new commit.

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "src-db/database/sourcedata/ETGO_SF_*.xml"
  push:
    branches: [main, develop, "epic/**", "feature/ETP-3993"]
    paths:
      - "src-db/database/sourcedata/ETGO_SF_*.xml"
  workflow_dispatch:

jobs:
  offline-regen-check:
    name: Offline Regen Check
    runs-on: ubuntu-latest
    env:
      GO_MODULE_NAME: com.etendoerp.go
      DEVELOP_BRANCH: develop
      MAIN_BRANCH: main
    steps:
      - name: Checkout com.etendoerp.go (into etendo_core/modules/com.etendoerp.go)
        uses: actions/checkout@v4
        with:
          path: etendo_core/modules/com.etendoerp.go
          fetch-depth: 0

      - name: Resolve target branch for schema_forge
        id: resolve-branch
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            GIT_BRANCH="${{ github.head_ref }}"
          else
            GIT_BRANCH="${GITHUB_REF#refs/heads/}"
          fi
          echo "GIT_BRANCH=$GIT_BRANCH" >> "$GITHUB_OUTPUT"

          case "$GIT_BRANCH" in
            hotfix/*) FALLBACK="$MAIN_BRANCH" ;;
            *)        FALLBACK="$DEVELOP_BRANCH" ;;
          esac
          echo "FALLBACK=$FALLBACK" >> "$GITHUB_OUTPUT"
          echo "Resolved GIT_BRANCH=$GIT_BRANCH fallback=$FALLBACK"

      - name: Wait for sibling repo push to settle
        # Both repos commit in lockstep. If com.etendoerp.go is pushed slightly
        # before schema_forge (or vice versa), the workflow could checkout an
        # outdated sibling. Sleeping a minute gives the human (or CI) time to
        # push the matching commit in the other repo before we clone it.
        run: sleep 60

      - name: Checkout schema_forge (matching branch or fallback)
        uses: actions/checkout@v4
        with:
          repository: etendosoftware/etendo_schema_forge
          path: etendo_core/etendo_schema_forge
          fetch-depth: 0

      - name: Align schema_forge branch
        working-directory: etendo_core/etendo_schema_forge
        run: |
          set -e
          BR="${{ steps.resolve-branch.outputs.GIT_BRANCH }}"
          FB="${{ steps.resolve-branch.outputs.FALLBACK }}"
          if git rev-parse --verify "origin/$BR" >/dev/null 2>&1; then
            git checkout "$BR"
            echo "✅ schema_forge on $BR"
          elif git rev-parse --verify "origin/$FB" >/dev/null 2>&1; then
            git checkout "$FB"
            echo "⚠️ $BR not found in schema_forge — using $FB"
          else
            echo "🚨 Neither $BR nor $FB exist in schema_forge" >&2
            exit 1
          fi
          git rev-parse --abbrev-ref HEAD
          git log -1 --oneline

      # @mirror-shared-below
      # Everything above this marker is replaced by scripts/mirror-offline-regen-check/header.yml
      # when generating the com.etendoerp.go mirror via `make sync-regen-check-workflow`.
      # Everything below is copied verbatim — keep it generic (no repo-specific labels).
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: etendo_core/etendo_schema_forge/package-lock.json

      - name: Install dependencies
        working-directory: etendo_core/etendo_schema_forge
        run: npm ci || npm install

      - name: Run offline regeneration check (make regen-check FROM_CACHE=1)
        working-directory: etendo_core/etendo_schema_forge
        run: |
          # Same invocation as Jenkins Stage 1.5: relative path to the
          # committed XMLs in the sibling com.etendoerp.go checkout.
          make regen-check FROM_CACHE=1 \
            REGEN_CHECK_PREV_XML_DIR=../modules/com.etendoerp.go/src-db/database/sourcedata

      - name: Verify no UI / contract drift
        working-directory: etendo_core/etendo_schema_forge
        run: |
          # schema_forge MUST stay clean after regen-check: contract.json,
          # artifacts/*/generated/*.jsx, mockData.js, etc. are committed and
          # should match what the offline pipeline produces from decisions.json
          # + ad-snapshot.json.
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::UI drift: committed contract.json / generated files do not match offline pipeline output"
            git status
            git --no-pager diff
            exit 1
          fi
          echo "✅ schema_forge clean — no UI / contract drift"

      - name: Dump drift diff on failure
        if: failure()
        working-directory: etendo_core/etendo_schema_forge
        run: |
          # Re-prints the same XML / UI diff that Jenkins prints, so the GHA
          # log explains *why* drift was detected — not just which files differ.
          if [ -d tmp/regen-check ]; then
            echo "---------------------- tmp/regen-check tree ----------------------"
            ls -la tmp/regen-check/ || true
            for spec_dir in tmp/regen-check/*/; do
              [ -d "$spec_dir" ] || continue
              spec=$(basename "$spec_dir")
              prev="$spec_dir/prev"
              pred="$spec_dir/predicted"
              if [ -d "$prev/sourcedata" ] && [ -d "$pred/sourcedata" ]; then
                echo "---------------------- XML drift for $spec (prev → predicted) ----------------------"
                # Use the checker's structured per-row, per-field report instead of
                # `diff -ru`. The raw XMLs from `export.database` carry per-row
                # `<!--PK-->` comment prefixes and blank-line separators that the
                # offline serializer does not emit, so a textual diff is mostly
                # noise. The checker parses both sides and prints only the rows /
                # fields that actually changed.
                node cli/src/xml-regeneration-check.js "$prev" "$pred" --include-dir sourcedata || true
              else
                echo "---------------------- $spec: prev/ or predicted/ missing, nothing to diff ----------------------"
              fi
            done
          else
            echo "No tmp/regen-check output produced — failure likely happened before regen-check ran."
          fi
          echo "---------------------- schema_forge git diff (UI / contract drift) ----------------------"
          git status || true
          git --no-pager diff || true
